[terminal]
output-format = "concise"

[src]
exclude = [
    ".venv",
    "build",
    "dist",
    "docs",
    "examples",
    "mypy_cache",
    "pytest_cache",
    "ruff_cache",
]

[rules]
all = "warn"
# ambiguous-protocol-member = "ignore"
# call-top-callable = "ignore"
# cyclic-class-definition = "ignore"
# cyclic-type-alias-definition = "ignore"
# deprecated = "ignore"
# empty-body = "ignore"
# ignore-comment-unknown-rule = "ignore"
# implicit-concatenated-string-type-annotation = "ignore"
# index-out-of-bounds = "ignore"
# ineffective-final = "ignore"
# invalid-attribute-access = "ignore"
# invalid-explicit-override = "ignore"
# invalid-type-checking-constant = "ignore"
# possibly-missing-attribute = "ignore"
# possibly-missing-import = "ignore"
# possibly-missing-implicit-call = "ignore"
# possibly-missing-submodule = "ignore"
# possibly-unresolved-reference = "ignore"
# raw-string-type-annotation = "ignore"
# redundant-cast = "ignore"
# redundant-final-classvar = "ignore"
# shadowed-type-variable = "ignore"
# static-assert-error = "ignore"
# type-assertion-failure = "ignore"
# unused-awaitable = "ignore"
# unused-ignore-comment = "ignore"
# useless-overload-body = "ignore"
