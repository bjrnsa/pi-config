fix = true
line-length = 88
indent-width = 4
exclude = [".git", ".pytest_cache", ".ruff_cache", ".venv"]
output-format = "concise"


[format]
docstring-code-format = true
docstring-code-line-length = "dynamic"

[lint]
preview = true
select = [
    "D",
    "E",
    "F",
    "UP",
    "B",
    "SIM",
    "I",
    "RET",
    "PERF101",
    "PERF102",
    "PERF402",
    "RUF006",
    "RUF008",
    "RUF009",
    "B035",
    "RUF013",
    "RUF015",
    "RUF017",
    "RUF024",
    "RUF027",
    "RUF029",
    "RUF032",
    "RUF034",
    "RUF040",
    "RUF043",
    "RUF049",
    "RUF052",
    "RUF055",
    "RUF056",
    "RUF058",
    "RUF061",
    "RUF066",
    "RUF069",
    "RUF073",
    "RUF100",
    "RUF101",
    "RUF102",
    "RUF103",
    "RUF104",
    "RUF200",
    "PLE",
    "PLW",
    "NPY",
    "PD",
    "PTH",
    "C4",
    "PLC0131",
    "PLC0205",
    "PLC0206",
    "PLC0208",
    "PLC0414",
    "PLC0415",
    "PLC1802",
    "PLC2801",
    "PLC3002",
    "ASYNC",
    "A",
    "ARG",
    "PIE",
    "ISC001",
    "ISC004",
    "ICN",
    "TID252",
    "N",
]
ignore = ["PLW0108"]

[lint.pydocstyle]
convention = "pep257"

[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-branches = 10
max-statements = 50
max-args = 5

[lint.per-file-ignores]
"**/tests/**" = ["D", "E501", "ARG002", "SIM102"]
"**/migrations/**" = ["D", "E501"]
